# .github/workflows/session-tests.yml
name: Session tests
on:
  pull_request:
    branches: [main]
  push:
    branches: ['bp/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: npm test
